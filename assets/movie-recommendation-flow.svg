<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#edf3f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#123d68" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#123d68"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15202b">Movie Recommendation 2-Stage Pipeline</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="20" fill="#5f6d7c">MovieLens 기반 후보 생성과 리랭킹을 분리해 Top-K 추천 성능을 개선</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="210" height="150" rx="24" fill="#ffffff" stroke="#d8dee8"/>
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#123d68">Input Data</text>
    <text x="100" y="270" font-family="Arial, sans-serif" font-size="18" fill="#364453">User History</text>
    <text x="100" y="300" font-family="Arial, sans-serif" font-size="18" fill="#364453">Movie Metadata</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="180" width="210" height="150" rx="24" fill="#ffffff" stroke="#d8dee8"/>
    <text x="400" y="230" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#123d68">Candidate</text>
    <text x="400" y="260" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#123d68">Generation</text>
    <text x="400" y="300" font-family="Arial, sans-serif" font-size="18" fill="#364453">EASE · Multi-VAE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="670" y="180" width="220" height="150" rx="24" fill="#ffffff" stroke="#d8dee8"/>
    <text x="700" y="230" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#123d68">Feature</text>
    <text x="700" y="260" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#123d68">Engineering</text>
    <text x="700" y="300" font-family="Arial, sans-serif" font-size="18" fill="#364453">Season · Genre · Rank</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="180" width="150" height="150" rx="24" fill="#ffffff" stroke="#d8dee8"/>
    <text x="1010" y="230" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#123d68">Re-rank</text>
    <text x="1010" y="270" font-family="Arial, sans-serif" font-size="18" fill="#364453">CatBoost</text>
    <text x="1010" y="300" font-family="Arial, sans-serif" font-size="18" fill="#364453">Top-10</text>
  </g>

  <path d="M 285 255 L 355 255" stroke="#123d68" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 590 255 L 655 255" stroke="#123d68" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 900 255 L 965 255" stroke="#123d68" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="180" y="410" width="840" height="120" rx="24" fill="#ffffff" stroke="#d8dee8"/>
    <text x="220" y="462" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#15202b">Result</text>
    <text x="350" y="462" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#123d68">Valid Recall@10 0.2012</text>
    <text x="670" y="462" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#123d68">Public LB 0.1670</text>
    <text x="220" y="500" font-family="Arial, sans-serif" font-size="18" fill="#5f6d7c">유저당 후보군 생성 후 약 40개 피처로 최종 추천 목록을 선정</text>
  </g>
</svg>
